name: Agent Harness Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  agent-lint:
    name: Agent architectural invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run agent lints
        run: bash scripts/agent-lint.sh

  # Tests removed — ci.yml runs the full test matrix (Python 3.11-3.13 with coverage).
  # This workflow focuses on architectural invariants only.
